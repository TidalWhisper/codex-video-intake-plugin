schema_version: "0.1.0"

default_profile: balanced

profile_catalog:
  preview:
    display_name: Preview
    description: Fast local iteration profile for verifying composition and continuity.
  balanced:
    display_name: Balanced
    description: Default local generation profile tuned for a better speed-quality tradeoff.
  quality:
    display_name: Quality
    description: Higher-fidelity profile for final stills when local runtime budget allows.

workflow_profiles:
  txt2img_keyframe_realistic:
    default_profile: balanced
    profiles:
      preview:
        dimension_scale: 0.75
        round_to_multiple: 64
        workflow_replacements:
          steps: 8
          cfg: 2.1
          sampler_name: res_multistep
          scheduler: sgm_uniform
          denoise: 1.0
      balanced:
        dimension_scale: 0.875
        round_to_multiple: 64
        workflow_replacements:
          steps: 12
          cfg: 2.3
          sampler_name: res_multistep
          scheduler: sgm_uniform
          denoise: 1.0
      quality:
        dimension_scale: 1.0
        round_to_multiple: 64
        workflow_replacements:
          steps: 16
          cfg: 2.5
          sampler_name: res_multistep
          scheduler: sgm_uniform
          denoise: 1.0

  stage05_realistic_cinematic_qwen2512_prompt_only:
    inherits: txt2img_keyframe_realistic

  stage05_shortdrama_realistic:
