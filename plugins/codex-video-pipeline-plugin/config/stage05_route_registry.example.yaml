schema_version: "0.1.0"

stage05_policy:
  provider_order:
    - openai_gpt_image2
    - comfyui_txt2img
    - manual
  provider_routing_mode: availability_first
  comfyui_route_resolution: route_family_first
  notes:
    - OpenAI provider order is fixed and is not changed by style family.
    - ComfyUI route selection resolves from Stage 00 normalized style into a Stage 05 route key.
    - A route is production-ready only after local smoke evidence exists.

stage00_style_to_route:
  写实电影感:
    primary_route: realistic_cinematic
    alternates: []
  短剧爽感:
    primary_route: shortdrama_realistic
    alternates: []
  日系动画风（日本动漫感）:
    primary_route: anime_jp
    alternates: []
  国漫动画风（中国动画/新国风）:
    primary_route: anime_cn_newguofeng
    alternates:
      - guofeng_ink
  美式动画/卡通风（欧美动画感）:
    primary_route: western_cartoon
    alternates: []
  国风水墨/古风:
    primary_route: guofeng_ink
    route_preset: elegant_single_subject_umbrella
    alternates: []
  赛博朋克:
    primary_route: stylized_concept
    route_preset: cyberpunk_neon
    alternates:
      - game_cg
  暗黑惊悚:
    primary_route: stylized_concept
    route_preset: dark_fantasy_noir
    alternates:
      - realistic_cinematic
  温暖治愈:
    primary_route: realistic_cinematic
    alternates:
      - anime_jp
  纪录片质感:
    primary_route: shortdrama_realistic
    alternates:
      - realistic_cinematic
  广告高级感:
    primary_route: realistic_cinematic
    alternates:
      - stylized_concept
  游戏CG感:
    primary_route: game_cg
    route_preset: heroic_splash_art
    alternates:
      - stylized_concept
  低饱和现实主义:
    primary_route: shortdrama_realistic
    alternates:
      - realistic_cinematic
  高饱和潮流感:
    primary_route: stylized_concept
    route_preset: chromatic_editorial
    alternates:
      - game_cg

routes:
  realistic_cinematic:
    display_name: Realistic Cinematic
    status: candidate
    style_family: realistic
    maturity: phase1_priority
    suitable_stage00_styles:
      - 写实电影感
      - 广告高级感
      - 温暖治愈
    current_workflow_mapping_key: stage05_realistic_cinematic
    current_workflow_target: txt2img_keyframe_realistic_zimage_photo_bridge
    current_model_candidate: Tongyi-MAI/Z-Image
    reference_guided_target:
      workflow_mapping_key: stage05_realistic_cinematic_qwen_edit_reference
      workflow_name: txt2img_keyframe_shortdrama_qwen_edit_reference
      model_id: Qwen/Qwen-Image-Edit-2511
      control_mode: reference_guided
      notes:
        - When Stage 03 character reference images are present, switch realistic_cinematic to the local Qwen Edit 2511 character-anchor bridge.
        - This follows the same community-backed ReferenceLatent pattern already used for short-drama character consistency.
    adoption_strategy:
      community_preference_policy: prefer_community_optimized_when_available
      preferred_workflow_candidate: txt2img_keyframe_realistic_zimage_photo_bridge
      preferred_model_candidate: Tongyi-MAI/Z-Image
      migration_state: repo_transitional
      notes:
        - The reduced Z-Image photo bridge has local smoke evidence on 2026-05-30 and is now the default local ComfyUI fallback for realistic_cinematic.
        - The bridge workflow preserves the upstream Z-Image photo model stack while removing rgthree-only UI routing so the Stage 05 executor can patch it as API JSON.
    workflow_candidates:
      - workflow_name: txt2img_keyframe_realistic
        source_type: repo_existing
        source_ref: workflows/comfyui/txt2img_keyframe_realistic.workflow_api.json
        origin: repo_transitional
        stack_profile: qwen2512_native_txt2img
        adoption_state: ready_to_import
        evidence_refs:
          - workflows/comfyui/txt2img_keyframe_realistic.workflow_api.json
        priority: 1
      - workflow_name: qwen_image_2512_official_template
        source_type: external_template
        source_ref: https://github.com/Comfy-Org/workflow_templates/blob/main/templates/image_qwen_Image_2512.json
        origin: official
        stack_profile: qwen2512_native_txt2img
        adoption_state: ready_to_import
        evidence_refs:
          - https://github.com/Comfy-Org/workflow_templates/blob/main/templates/image_qwen_Image_2512.json
        priority: 1
      - workflow_name: txt2img_keyframe_realistic_zimage_photo_bridge
        source_type: repo_bridge
        source_ref: workflows/comfyui/txt2img_keyframe_realistic_zimage_photo_bridge.workflow_api.json
        origin: repo_bridge
        stack_profile: zimage_photo_bridge_api
        workflow_format: api_workflow
        custom_node_dependencies: []
        import_blockers: []
        adoption_state: current_repo
        evidence_refs:
          - workflows/comfyui/txt2img_keyframe_realistic_zimage_photo_bridge.workflow_api.json
          - scripts/providers/build_stage05_zimage_photo_bridge.py
          - video_projects/real_smoke_20260530_stage05_zimage_bridge_clean/05_images/keyframe_image_manifest.json
          - https://github.com/martin-rizzo/AmazingZImageWorkflow/blob/master/amazing-z-photo_SAFETENSORS.json
        priority: 1
      - workflow_name: amazing_z_photo_safetensors
        source_type: community_workflow
        source_ref: https://github.com/martin-rizzo/AmazingZImageWorkflow/blob/master/amazing-z-photo_SAFETENSORS.json
        origin: community
        stack_profile: zimage_photo_commercial
        workflow_format: ui_graph
        custom_node_dependencies:
          - rgthree-comfy
        import_blockers:
          - Upstream file is a ComfyUI UI graph with 266 nodes, not an API workflow export.
          - Current Stage 05 executor only patches API workflow JSON by node id and cannot consume rgthree UI logic directly.
        adoption_state: ready_to_import
        evidence_refs:
          - https://github.com/martin-rizzo/AmazingZImageWorkflow/blob/master/amazing-z-photo_SAFETENSORS.json
          - https://github.com/aistudynow/Z-Image-Turbo-Lora-Stack-V4
        priority: 1
      - workflow_name: hidream_i1_comfyui
        source_type: external_template
        source_ref: https://huggingface.co/Comfy-Org/HiDream-I1_ComfyUI
        origin: official
        stack_profile: hidream_dev_sd3
        adoption_state: ready_to_import
        evidence_refs:
          - https://huggingface.co/Comfy-Org/HiDream-I1_ComfyUI
        priority: 2
    model_candidates:
      - model_id: Qwen/Qwen-Image-2512
        source: huggingface
        suitability: native-fit
        priority: 1
        notes: Primary open image baseline for realistic and commercial stills.
      - model_id: Tongyi-MAI/Z-Image
        source: huggingface
        suitability: native-fit
        priority: 1
        notes: Strong general high-quality route and cross-route candidate.
      - model_id: HiDream-ai/HiDream-I1
        source: github
        suitability: native-fit
        priority: 2
        notes: Higher-risk but strong candidate for premium visual polish.
    smoke_focus:
      - hero close-up realism
      - indoor dialogue frame
      - commercial hero composition

