          - F:/ComfyUI/ComfyUI/user/default/workflows/AI漫剧制作/Qwen-Edit-2511-shortdrama-character-anchor-base.json
          - F:/ComfyUI/ComfyUI/user/default/workflows/AI漫剧制作/Qwen-Edit-2511-shortdrama-character-anchor-base.md
          - F:/ComfyUI/ComfyUI/venv/Lib/site-packages/comfyui_workflow_templates_media_image/templates/02_qwen_Image_edit_subgraphed.json
        priority: 1
      - workflow_name: qwen_image_2512_official_template
        source_type: external_template
        source_ref: https://github.com/Comfy-Org/workflow_templates/blob/main/templates/image_qwen_Image_2512.json
        origin: official
