    current_workflow_target: txt2img_keyframe_stylized_zimage_image_b_bridge
    current_model_candidate: Tongyi-MAI/Z-Image
    style_presets:
      cyberpunk_neon:
        display_name: Cyberpunk Neon
        positive_anchor: You are a digital artist. Your image is a masterpiece featuring heavy chromatic aberration and digital intense color. The aesthetic is ultra-modern and fragmented, using a high-contrast palette of neon purples and cyans, creating a sense of a digital reality.
        negative_anchor: daylight realism, muted city palette, washed-out neon, weak reflections, low-tech street photography, bland signage, soft low-contrast atmosphere
