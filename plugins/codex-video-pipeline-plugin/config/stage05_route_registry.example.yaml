    style_presets:
      elegant_single_subject_umbrella:
        display_name: Elegant Single Subject Umbrella
        positive_anchor: You are composing a refined guofeng ink illustration of a single elegant protagonist. The body silhouette must read clearly with exactly two arms and two hands, believable shoulder and wrist anatomy, and one oil-paper umbrella only in the full frame. The umbrella must have one handle only and be naturally held by a real visible hand, or by both hands touching the same single handle. Favor graceful sleeve flow, readable hand-to-prop contact, and calm poetic posture over busy gesture complexity. Do not introduce any second umbrella in background or foreground.
        negative_anchor: extra hands, extra fingers, duplicated arm, broken wrist, detached umbrella handle, floating umbrella, impossible grip, tangled sleeve anatomy, multiple overlapping hand silhouettes, malformed elbow, fractured shoulder line, second umbrella, duplicate umbrella canopy, extra parasol in background, mirrored accessory duplication
        notes:
          - Use this preset for the current guofeng smoke route until a stronger structure-controlled workflow exists.
