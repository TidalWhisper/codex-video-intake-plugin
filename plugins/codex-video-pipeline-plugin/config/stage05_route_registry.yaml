schema_version: "0.1.0"

stage05_policy:
  provider_order:
    - comfyui_txt2img
    - manual
  provider_routing_mode: availability_first
  comfyui_route_resolution: route_family_first
  notes:
    - Stage 05 mainline is pinned to the three verified local Zimage UI workflows.
    - Do not route Stage 05 back through OpenAI image generation, bridge workflows, or Qwen compatibility fallbacks.
    - Route-level style selection must happen through the real Zimage UI style selector, not by preserving alternate legacy branches.

stage00_style_to_route:
  写实电影感:
    primary_route: realistic_cinematic
    route_preset: classic_film_realism
    alternates: []
  短剧爽感:
    primary_route: shortdrama_realistic
    route_preset: classic_film
    alternates: []
  日系动画风（日本动漫感）:
    primary_route: anime_jp
    route_preset: anime_default
    alternates: []
  国漫动画风（中国动画/新国风）:
    primary_route: anime_cn_newguofeng
    route_preset: cn_illustration
    alternates: []
  美式动画/卡通风（欧美动画感）:
    primary_route: western_cartoon
    route_preset: comic_default
    alternates: []
  国风水墨/古风:
    primary_route: guofeng_ink
    route_preset: elegant_single_subject_umbrella
    alternates: []
  赛博朋克:
    primary_route: stylized_concept
    route_preset: cyberpunk_neon
    alternates: []
  暗黑惊悚:
    primary_route: stylized_concept
    route_preset: dark_fantasy_noir
    alternates: []
  温暖治愈:
    primary_route: realistic_cinematic
    route_preset: light_and_airy
    alternates: []
  纪录片质感:
    primary_route: shortdrama_realistic
    route_preset: street_documentary
    alternates: []
  广告高级感:
    primary_route: realistic_cinematic
    route_preset: high_key_fashion
    alternates: []
  游戏CG感:
    primary_route: game_cg
    route_preset: heroic_splash_art
    alternates: []
  低饱和现实主义:
    primary_route: shortdrama_realistic
    route_preset: orthochromatic_realism
    alternates: []
  高饱和潮流感:
    primary_route: stylized_concept
    route_preset: chromatic_editorial
    alternates: []

routes:
  realistic_cinematic:
    display_name: Realistic Cinematic
    status: approved
    style_family: realistic
    maturity: mainline_locked
    suitable_stage00_styles:
      - 写实电影感
      - 广告高级感
      - 温暖治愈
    current_workflow_mapping_key: stage05_realistic_cinematic_amazing_z_photo_original
    current_workflow_target: amazing_z_photo_safetensors
    current_model_candidate: Tongyi-MAI/Z-Image
    style_presets:
      classic_film_realism:
        display_name: Classic Film Realism
        style_selector: classic_film_photo
        positive_anchor: Keep the frame grounded inside the story world, cinematic but natural, with believable human proportions, stable environment continuity, and no behind-the-scenes production cues.
        negative_anchor: behind-the-scenes film set, crew equipment, camera operator, camera rig, monitor, tripod, boom mic, staged studio shoot, glam fashion set, duplicate subject, warped coastline
      production_photo:
        display_name: Production Photo
        style_selector: production_photo
        positive_anchor: Keep the image grounded, cinematic, and readable, with believable human proportions and a stable environment-first composition when the shot asks for it.
        negative_anchor: behind-the-scenes film set, crew equipment, camera operator, camera rig, monitor, tripod, boom mic, meta filmmaking props, distorted body width, duplicate subject, warped coastline
      environmental_establishing_film:
        display_name: Environmental Establishing Film
        style_selector: classic_film_photo
        positive_anchor: Keep the frame as a story-world environmental establishing shot, with coastline or surrounding location clearly visible, a smaller in-frame subject, and no editorial or on-set staging cues.
        negative_anchor: behind-the-scenes film set, crew equipment, camera operator, camera rig, monitor, tripod, boom mic, staged studio shoot, face-dominant crop, glamour beauty portrait
      high_key_fashion:
        display_name: High Key Fashion Photo
        style_selector: high_key_fashion_photo
        positive_anchor: Keep the composition premium, polished, and editorial, with clean silhouette hierarchy and a luxury campaign feel.
        negative_anchor: cheap ecommerce framing, muddy lighting, flat stock-photo composition, warped anatomy, duplicated accessories
      light_and_airy:
        display_name: Light and Airy Photo
        style_selector: light_and_airy_photo
        positive_anchor: Keep the image gentle, breathable, and emotionally warm, with airy light and soft environmental openness around the subject.
        negative_anchor: gloomy thriller palette, harsh contrast, cramped framing, anatomy stretch, duplicate person
    adoption_strategy:
      community_preference_policy: prefer_community_optimized_when_available
      preferred_workflow_candidate: amazing_z_photo_safetensors
      preferred_model_candidate: Tongyi-MAI/Z-Image
      migration_state: repo_transitional
      notes:
        - Realistic Stage 05 now runs directly on the local Amazing Z-Photo UI workflow.
        - Do not keep or reintroduce Stage 05 prompt-only Qwen or reference-guided Qwen detours as compatibility branches.
    workflow_candidates:
      - workflow_name: amazing_z_photo_safetensors
        source_type: community_workflow
        source_ref: F:/ComfyUI/ComfyUI/user/default/workflows/Zimage/amazing-z-photo_SAFETENSORS.json
        origin: community
        stack_profile: zimage_photo_style_switch_ui
        workflow_format: ui_graph
        custom_node_dependencies:
          - rgthree-comfy
        import_blockers: []
        adoption_state: current_repo
        evidence_refs:
          - F:/ComfyUI/ComfyUI/user/default/workflows/Zimage/amazing-z-photo_SAFETENSORS.json
          - E:/Codex-Plugin/codex-video-intake-plugin/.tmp-style-compare-20260602-photo-allstyles/contact_sheet_allstyles.png
        priority: 1
    model_candidates:
      - model_id: Tongyi-MAI/Z-Image
        source: huggingface
        suitability: native-fit
        priority: 1
        notes: Local mainline realistic workflow proven through the original Zimage photo UI graph.
    smoke_focus:
      - environment-first realistic frame
      - single-subject cinematic still
      - horizontal beach establishing shot

